<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Macave Mining</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div id="ads">🚀 Plataforma Segura e Retorno Diário!</div>
    <nav id="menu">
      <button onclick="showTab('mining')">⛏️ Mineração</button>
      <button onclick="showTab('deposit')">💰 Depósito</button>
      <button onclick="showTab('withdraw')">💸 Saque</button>
      <button onclick="showTab('contact')">📞 Contato</button>
      <button onclick="showTab('login')">🔑 Login / Registrar</button>
    </nav>
  </header>

  <main id="content">
    <div id="login" class="tab">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Senha">
      <button onclick="login()">Entrar</button>
      <button onclick="showTab('register')">Registrar</button>
    </div>

    <div id="register" class="tab" style="display:none;">
      <h2>Registrar</h2>
      <input type="email" id="reg-email" placeholder="Email">
      <input type="password" id="reg-password" placeholder="Senha">
      <button onclick="register()">Registrar</button>
      <button onclick="showTab('login')">Voltar</button>
    </div>

    <div id="mining" class="tab" style="display:none;">
      <h2>⛏️ Planos de Mineração</h2>
      <div id="plans"></div>
    </div>

    <div id="deposit" class="tab" style="display:none;">
      <h2>💰 Depósitos</h2>
      <ul>
        <li>USDT (TRC20): TX123 <button>Copiar</button></li>
        <li>USDT (BEP20): 0xBEP123 <button>Copiar</button></li>
        <li>Bitcoin (BTC): 1BTC123 <button>Copiar</button></li>
        <li>Ethereum (ERC20): 0xERC123 <button>Copiar</button></li>
      </ul>
    </div>

    <div id="withdraw" class="tab" style="display:none;">
      <h2>💸 Saques</h2>
      <p>Formulário de saque aqui</p>
    </div>

    <div id="contact" class="tab" style="display:none;">
      <h2>📞 Contato</h2>
      <p>Email: suporte@macavemining.com</p>
    </div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
