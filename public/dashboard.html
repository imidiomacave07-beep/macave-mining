<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dashboard - Macave Mining</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Dashboard</h1>
<nav>
  <button onclick="showSection('mining')">⛏️ Mineração</button>
  <button onclick="showSection('deposit')">💰 Depósito</button>
  <button onclick="showSection('withdraw')">💸 Saque</button>
  <button onclick="showSection('contact')">📞 Contato</button>
</nav>

<section id="mining">
  <h2>Planos de Mineração</h2>
  <div id="plans"></div>
</section>
<section id="deposit" style="display:none">
  <h2>Depósito</h2>
  <p>Aqui vai depositar</p>
</section>
<section id="withdraw" style="display:none">
  <h2>Saque</h2>
  <p>Aqui vai sacar</p>
</section>
<section id="contact" style="display:none">
  <h2>Contato</h2>
  <p>Informações de contato</p>
</section>

<script src="dashboard.js"></script>
</body>
</html>
