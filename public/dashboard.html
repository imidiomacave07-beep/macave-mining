<h2>⛏️ Planos de Mineração</h2>
<div id="plans"></div>

<script>
  fetch('/api/plans')
    .then(res => res.json())
    .then(plans => {
      const container = document.getElementById('plans');
      plans.forEach(plan => {
        container.innerHTML += `
          <div class="plan">
            <h3>${plan.name}</h3>
            <p>Preço: $${plan.price}</p>
            <p>Lucro: ${plan.minProfit}% – ${plan.maxProfit}% / dia</p>
            <button>Comprar</button>
          </div>
        `;
      });
    });
                    </script>
